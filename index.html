<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> SyntaxWear - Tenis e Sneakers Online</title>
    <meta name="description"
        content="Encontre os melhores tênis e sneakers online na SyntaxWear. Explore nossa coleção exclusiva de calçados para homens e mulheres, com designs modernos e conforto incomparável. Compre agora e transforme seu estilo com nossos produtos de alta qualidade.">
    <link rel="stylesheet" href="./css/base/reset.css">
    <link rel="stylesheet" href="./css/base/variables.css">
    <link rel="stylesheet" href="./css/base/base.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/hero.css">
    <link rel="stylesheet" href="css/components/product-category.css">
    <link rel="stylesheet" href="css/components/product-grid.css">

</head>

<body>
    <header class="header">
        <!-- Logo e navegação -->
        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
                <img src="assets/images/icons/logo.svg" alt="Logo SyntaxWear - Tenis e Sneakers Online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Menu de Acesso Rápido">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#" aria-label="Minha conta"><img src="assets/images/icons/user.svg" alt="Usuário"></a></li>
                <li><a href="#" aria-label="Ajuda"><img src="assets/images/icons/help.svg" alt="Ajuda"></a></li>
                <li><a href="#" aria-label="Carrinho"><img src="assets/images/icons/bag.svg" alt="Sacola"></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <!-- Seção Hero -->
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a href="#" class="btn btn-outline">Ver modelos</a>
                        <a href="#" class="btn btn-filled">Comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="categories-section">
            <!-- Seção de categorias de tênis -->
            <div class="category-card casual">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn-outline  btn">Casual</span>
                </a>
            </div>
            <div class="category-card esporte">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn-outline  btn">Esporte</span>
                </a>
            </div>
            <div class="category-card moderno">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn-outline  btn">Moderno</span>
                </a>
            </div>
            <div class="category-card futurista">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn-outline  btn">Futurista</span>
                </a>
            </div>
        </section>

        <section class="grid-section">
            <!-- Grid com produtos em destaque -->
            <div class="card highlight">
                <div class="top1-content">
                    <h3 class="card-title">Krypton One</h3>
                    <p class="card-subtitle">Estilo Urbano com Atitude</p>
                    <div class="cta-group">
                        <a href="#" class="btn btn-outline">Feminino</a>
                        <a href="#" class="btn btn-outline">Masculino</a>
                    </div>
                </div>
            </div>
            <div class="card sneacker-purple"></div>
            <div class="card model"></div>
            <div class="card sneacker-color"></div>
            <div class="card sneacker-white"></div>
            <div class="card sneacker-silver"></div>

        </section>
    </main>

    <footer>
        <!-- Footer com informações de contato e links -->
    </footer>
</body>

</html>
